name: Run Bot

on:
  schedule:
    - cron: "*/5 * * * *" # Runs every 5 minutes
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true # Required to push state changes back

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install web3

      - name: Run bot
        env:
          ALCHEMY_KEY: ${{ secrets.ALCHEMY_KEY }}
        run: python main.py

      - name: Commit and Push State
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add state.json
          git commit -m "Update last_block state [skip ci]" || echo "No changes to state"
          git push
