name: POIDH Bounty Bot

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 * * * *'  # Runs once every hour
  workflow_dispatch:      # Allows you to click "Run Workflow" manually

jobs:
  check-claims:
    runs-on: ubuntu-latest
    
    # Allows the bot to update last_seen_id.json in your repo
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install web3 requests

      - name: Run python script
        env:
          ALCHEMY_KEY: ${{ secrets.ALCHEMY_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BOT_PRIVATE_KEY: ${{ secrets.BOT_PRIVATE_KEY }}
        run: python main.py

      - name: Save progress back to GitHub
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add last_seen_id.json || echo "No file to add yet"
          git commit -m "Update last seen claim ID" || echo "No changes to commit"
          git push
