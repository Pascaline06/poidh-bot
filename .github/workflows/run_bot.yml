name: Run POIDH Bot

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

# CRITICAL: This allows the bot to push state.json changes
permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install web3

      - name: Run Bot
        env:
          ALCHEMY_KEY: ${{ secrets.ALCHEMY_KEY }}
        run: python main.py

      - name: Commit and Push State
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git commit -m "Update last_block state [skip ci]" || echo "No changes"
          git push
