name: Run Poidh Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"  # runs every 5 minutes

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install web3

      - name: Run bot
        env:
          ALCHEMY_KEY: ${{ secrets.ALCHEMY_KEY }}
        run: python main.py
