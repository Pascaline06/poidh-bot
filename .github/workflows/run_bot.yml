name: Run POIDH Bot
on:
  schedule:
    - cron: '0 * * * *' # This means "Run every 60 minutes"
  workflow_dispatch: # This adds a "Start" button for you to test it manually

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Tools
        run: pip install -r requirements.txt

      - name: Start the Bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PINATA_JWT: ${{ secrets.PINATA_JWT }}
          PINATA_GATEWAY: ${{ secrets.PINATA_GATEWAY }}
          APP_FID: ${{ secrets.APP_FID }}
          FARCASTER_DEVELOPER_MNEMONIC: ${{ secrets.FARCASTER_DEVELOPER_MNEMONIC }}
          NEYNAR_API_KEY: ${{ secrets.NEYNAR_API_KEY }} # Added this!
        run: python -u main.py # Added -u for real-time logs
